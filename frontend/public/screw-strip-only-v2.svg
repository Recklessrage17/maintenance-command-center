<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 310" role="img" aria-labelledby="title desc">
  <title id="title">Screw strip only</title>
  <desc id="desc">Screw reference strip with drive spline end and screw flights only.</desc>
  <defs>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f1fbff" stop-opacity="0.92"/>
      <stop offset="0.34" stop-color="#c4d3d8" stop-opacity="0.96"/>
      <stop offset="0.58" stop-color="#8198a1" stop-opacity="0.98"/>
