<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">Screw measurement map</title>
  <desc id="desc">Dark technical screw measurement reference with feed, transition, and metering labels.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#082538"/>
      <stop offset="0.55" stop-color="#061723"/>
      <stop offset="1" stop-color="#02080d"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f1fbff" stop-opacity="0.92"/>
      <stop offset="0.34" stop-color="#c4d3d8" stop-opacity="0.96"/>
      <stop offset="0.58" stop-color="#8198a1" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#26343b" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="flight" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fdff" stop-opacity="0.9"/>
      <stop offset="0.42" stop-color="#b6c8cf" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#34444c" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="drive" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#394b54"/>
      <stop offset="0.5" stop-color="#b8ccd4"/>
      <stop offset="1" stop-color="#5d727b"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-35%" width="120%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00070d" flood-opacity="0.38"/>
    </filter>
    <clipPath id="flightClip">
      <rect x="260" y="116" width="940" height="154" rx="0"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="1384" height="414" rx="18" fill="#030d17" stroke="#18506a" stroke-width="2"/>
  <rect x="100" y="58" width="1200" height="270" rx="14" fill="url(#panel)" stroke="#174b62" stroke-width="1.5"/>

  <rect x="260" y="116" width="340" height="154" fill="#0a7faf" opacity="0.16"/>
  <rect x="600" y="116" width="340" height="154" fill="#12b686" opacity="0.16"/>
  <rect x="940" y="116" width="260" height="154" fill="#c18b1e" opacity="0.16"/>
  <path d="M600 86 V326 M940 86 V326" stroke="#84a3ad" stroke-width="1.2" stroke-dasharray="7 9" opacity="0.3"/>
  <path d="M260 116 H1200 M260 270 H1200" stroke="#31d8ff" stroke-width="1.5" stroke-dasharray="9 9" opacity="0.62"/>

  <g filter="url(#softShadow)">
    <text x="82" y="162" fill="#f3fbff" font-family="Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle">DRIVE /</text>
    <text x="82" y="183" fill="#f3fbff" font-family="Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle">SPLINE END</text>

    <rect x="80" y="188" width="104" height="66" rx="9" fill="url(#drive)" stroke="#eaf7fb" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M98 202 H166 M98 216 H166 M98 230 H166 M98 244 H166" fill="none" stroke="#eaf7fb" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
    <rect x="184" y="174" width="48" height="94" rx="8" fill="url(#drive)" stroke="#eaf7fb" stroke-opacity="0.55" stroke-width="1.5"/>
    <rect x="232" y="188" width="42" height="66" rx="6" fill="url(#drive)" stroke="#eaf7fb" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M274 202 L260 196 L260 246 L274 240 Z" fill="#95aab1" stroke="#eaf7fb" stroke-opacity="0.45"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M260 196 C380 196 500 196 600 198 C720 201 836 190 940 176 L1200 176 L1200 246 L940 246 C836 235 720 230 600 226 C500 224 380 224 260 224 Z" fill="url(#steel)" stroke="#eaf7fb" stroke-opacity="0.28" stroke-width="1.2"/>
    <path d="M260 196 C380 196 500 196 600 198 C720 201 836 190 940 176 L1200 176" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="3" stroke-linecap="round"/>
    <path d="M260 211 C380 211 500 211 600 213 C720 216 836 207 940 193 L1198 193" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M260 224 C380 224 500 224 600 226 C720 230 836 235 940 246 L1200 246" fill="none" stroke="#02080d" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>

