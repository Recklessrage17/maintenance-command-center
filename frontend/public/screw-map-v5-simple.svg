        <path d="M280 116 H310 L372 270 H342 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M314 120 L372 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
