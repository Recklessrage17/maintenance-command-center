        <path d="M396 116 H426 L488 270 H458 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M430 120 L488 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M454 116 H484 L546 270 H516 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M488 120 L546 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M512 116 H542 L604 270 H574 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M546 120 L604 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M570 116 H600 L662 270 H632 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M604 120 L662 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M628 116 H658 L720 270 H690 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M662 120 L720 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M686 116 H716 L778 270 H748 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M720 120 L778 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M744 116 H774 L836 270 H806 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M778 120 L836 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M802 116 H832 L894 270 H864 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M836 120 L894 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M860 116 H890 L952 270 H922 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M894 120 L952 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M918 116 H948 L1010 270 H980 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M952 120 L1010 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M976 116 H1006 L1068 270 H1038 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M1010 120 L1068 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M1034 116 H1064 L1126 270 H1096 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M1068 120 L1126 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
        <path d="M1092 116 H1122 L1184 270 H1154 Z" fill="url(#flight)" stroke="#f4fcff" stroke-opacity="0.78" stroke-width="1.3"/><path d="M1126 120 L1184 266" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
      </g>
    </g>
    <rect x="1200" y="118" width="24" height="150" rx="3" fill="#a7bac1" stroke="#eaf7fb" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="1224" y1="124" x2="1224" y2="262" stroke="#f2fbff" stroke-opacity="0.7" stroke-width="2"/>
  </g>

  <g font-family="Arial, sans-serif" font-weight="900" text-anchor="middle">
    <path d="M278 336 H555" stroke="#44d7ff" stroke-width="2.5" opacity="0.55"/>
    <path d="M616 336 H890" stroke="#36e5aa" stroke-width="2.5" opacity="0.55"/>
    <path d="M960 336 H1190" stroke="#ffd36f" stroke-width="2.5" opacity="0.55"/>
    <text x="416" y="370" fill="#44d7ff" font-size="28">FEED</text>
    <text x="754" y="370" fill="#36e5aa" font-size="28">TRANSITION</text>
    <text x="1075" y="370" fill="#ffd36f" font-size="28">METERING</text>
  </g>
</svg>